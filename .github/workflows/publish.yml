name: Publish

# Publishes to npm on a GitHub release using trusted publishing (OIDC), so there
# is no token to store. Pin the actions below to commit SHAs before launch.
on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build
      - run: node --test
      - name: Generate SBOM
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom.cyclonedx.json
      - name: Attach SBOM to the release
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.cyclonedx.json --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - run: npm publish --access public --provenance
      - name: Pack for attestation
        run: |
          mkdir -p dist-pack
          npm pack --pack-destination dist-pack
      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: dist-pack/*.tgz
