name: Publish

# Publishes to npm on a GitHub release using trusted publishing (OIDC), so there
# is no token to store. Pin the actions below to commit SHAs before launch.
on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build
      - run: node --test
      - name: Generate SBOM
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom.cyclonedx.json
      - name: Attach SBOM to the release
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.cyclonedx.json --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - run: npm publish --access public --provenance
      - name: Pack for attestation
        run: |
          mkdir -p dist-pack
          npm pack --pack-destination dist-pack
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist-pack/*.tgz
